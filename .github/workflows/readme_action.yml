name: Generate README from truth sources

on:
  push:
    branches:
      - '**'
    paths:
      - 'README_truth*.adoc'
  workflow_dispatch:

jobs:
  generate-readme:
    name: Process README_truth → README
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/jdks
          key: gradle-deps-${{ hashFiles('**/libs.versions.toml', '**/*.gradle.kts') }}
          restore-keys: gradle-deps-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject plugin config
        run: echo "${{ secrets.README_GRADLE_PLUGIN }}" > readme-plugin/readme.yml

      - name: Generate README and commit via JGit
        run: ./gradlew -p readme-plugin commitGeneratedReadme --no-daemon

      - name: Summary
        if: always()
        run: |
          echo "### README — Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          git diff HEAD~1 --name-only 2>/dev/null | while read f; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done || echo "- *(first run)*" >> $GITHUB_STEP_SUMMARY
