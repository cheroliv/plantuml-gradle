name: CI

on:
  # Triggered after README generation completes — ensures check runs on up-to-date README
  workflow_run:
    workflows:
      - "Generate README from truth sources"
    types:
      - completed

  # Also triggered directly on code pushes (non-README files) and pull_requests
  push:
    branches:
      - '**'
    paths-ignore:
      - 'README_truth*.adoc'
      - '**.md'
  pull_request:

jobs:
  check:
    name: Build & check
    runs-on: ubuntu-latest

    # When triggered by workflow_run, only proceed if the upstream workflow succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        # When triggered by workflow_run, check out the branch that triggered it
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/jdks
          key: gradle-deps-${{ hashFiles('**/libs.versions.toml', '**/*.gradle.kts') }}
          restore-keys: gradle-deps-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run check
        run: ./gradlew -p readme-plugin clean check --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            readme-plugin/build/reports/tests/
            readme-plugin/build/reports/cucumber.*
